name: Backend Build Artifact

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/**"
  pull_request:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/**"
  workflow_dispatch:

jobs:
  build-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build backend with Maven Wrapper
        working-directory: backend
        run: ./mvnw clean package

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: |
            backend/target/*.jar
            !backend/target/*.jar.original
          if-no-files-found: error
          retention-days: 14